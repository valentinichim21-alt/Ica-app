<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidenta RS</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .rama { background: #111; border: 2px solid #D4AF37; border-radius: 20px; padding: 15px; max-width: 380px; margin: auto; box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .titlu { color: #D4AF37; font-weight: bold; font-size: 20px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* TAXE SUS STÂNGA-DREAPTA */
        .taxe { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #000; padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .t-item { text-align: left; font-size: 11px; color: #888; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .t-item b { float: right; color: #ff4d4d; font-size: 12px; }

        /* NET AZI MARE */
        .net-box { margin: 10px 0; padding: 10px; border-top: 1px solid #D4AF37; border-bottom: 1px solid #D4AF37; }
        #n_azi { font-size: 34px; color: #D4AF37; font-weight: bold; }

        /* EVIDENȚĂ PE ZILE */
        .istoric { margin-top: 15px; background: #000; border-radius: 12px; padding: 10px; border: 1px solid #333; text-align: left; font-size: 12px; }
        .zi-r { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #111; color: #888; }
        .zi-r b { color: #25D366; }
        .total-info { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 5px; border-top: 1px solid #444; }

        /* INPUTURI DATE */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 16px; color: #D4AF37; font-weight: bold; }
        label { font-size: 9px; color: #D4AF37; font-weight: bold; display: block; text-align: left; margin-bottom: 3px; text-transform: uppercase; }

        .btn-c { width: 100%; padding: 18px; background: #D4AF37; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-w { width: 100%; padding: 12px; background: #25D366; color: #fff; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; display: block; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body onload="incarcaDate()">

    <div class="rama">
        <div class="titlu">Evidenta RS</div>

        <!-- DETALII TAXE CALCULATE -->
        <div class="taxe">
            <div class="t-item">FLOTĂ (10%): <b id="o_f">0.00</b></div>
            <div class="t-item">GAZ (GPL): <b id="o_g">0.00</b></div>
            <div class="t-item">TAXĂ ORE: <b id="o_o">0.00</b></div>
            <div class="t-item">TIPS CASH: <b id="o_t" style="color:#25D366">0.00</b></div>
        </div>

        <div class="net-box">
            <small style="color:#888;">PROFIT NET AZI</small><br>
            <span id="n_azi">0.00 Lei</span>
        </div>

        <!-- TABEL EVIDENȚĂ -->
        <div class="istoric">
            <div style="font-size: 9px; color: #D4AF37; margin-bottom: 5px; text-align: center; font-weight: bold;">EVIDENȚĂ SĂPTĂMÂNALĂ</div>
            <div id="list">
                <!-- Zilele se pun aici automat -->
            </div>
            <div class="total-info">
                <span style="color: #888;">TOTAL LUNĂ:</span>
                <span style="color: #D4AF37; font-weight: bold;"><b id="t_l">0.00</b> Lei</span>
            </div>
        </div>

        <!-- INTRODUCERE DATE -->
        <div class="grid">
            <div><label>Brut App</label><input type="number" id="i_b" placeholder="0"></div>
            <div><label>Tips Cash</label><input type="number" id="i_t" placeholder="0"></div>
            <div><label>KM Parcurși</label><input type="number" id="i_k" placeholder="0"></div>
            <div><label>Ore Lucrate</label><input type="number" id="i_o" placeholder="0"></div>
        </div>

        <button class="btn-c" onclick="calculeazaSiSalveaza()">Calculează și Salvează</button>

        <a href="#" class="btn-w" onclick="trimiteWhatsApp()">Trimite pe WhatsApp</a>
        
        <div onclick="if(confirm('Resetezi tot istoricul?')){localStorage.clear();location.reload();}" style="font-size:8px;color:#333;margin-top:20px;cursor:pointer;">RESETEAZĂ DATELE</div>
    </div>

    <script>
        const zileleSaptamanii = ['Luni', 'Marți', 'Miercuri', 'Joi', 'Vineri', 'Sâmbătă', 'Duminică'];

        function incarcaDate() {
            let dateSalvate = JSON.parse(localStorage.getItem('ica_evid')) || {};
            let html = '';
            let totalGeneral = 0;

            zileleSaptamanii.forEach(zi => {
                let sumaZi = dateSalvate[zi] || "0.00";
                totalGeneral += parseFloat(sumaZi);
                html += `<div class="zi-r"><span>${zi}</span><b>${sumaZi} Lei</b></div>`;
            });

            document.getElementById('list').innerHTML = html;
            document.getElementById('t_l').innerText = totalGeneral.toFixed(2);
        }

        function calculeazaSiSalveaza() {
            let brut = parseFloat(document.getElementById('i_b').value) || 0;
            let tips = parseFloat(document.getElementById('i_t').value) || 0;
            let km = parseFloat(document.getElementById('i_k').value) || 0;
            let ore = parseFloat(document.getElementById('i_o').value) || 0;

            // Formule taxe
            let flota = brut * 0.10;
            let gaz = (km / 100) * 11.5 * 5.00;
            let taxaOre = ore * 12;
            let netAzi = (brut - flota - gaz - taxaOre + tips).toFixed(2);

            // Afișare taxe sus
            document.getElementById('o_f').innerText = flota.toFixed(2);
            document.getElementById('o_g').innerText = gaz.toFixed(2);
            document.getElementById('o_o').innerText = taxaOre.toFixed(2);
            document.getElementById('o_t').innerText = tips.toFixed(2);
            document.getElementById('n_azi').innerText = netAzi + ' Lei';

            // Salvare automată pe ziua curentă
            let d = new Date();
            let indexZi = d.getDay(); // 0 e Duminică, 1 e Luni...
            let numeZiAzi = (indexZi === 0) ? 'Duminică' : zileleSaptamanii[indexZi - 1];

            let dateSalvate = JSON.parse(localStorage.getItem('ica_evid')) || {};
            dateSalvate[numeZiAzi] = netAzi;
            localStorage.setItem('ica_evid', JSON.stringify(dateSalvate));

            // Reîncărcare tabel după o scurtă pauză
            setTimeout(incarcaDate, 300);
        }

    function trimiteWhatsApp() {
    var azi = document.getElementById('n_azi').innerText;
    var flota = document.getElementById('o_f').innerText;
    var gaz = document.getElementById('o_g').innerText;
    var taxe = document.getElementById('o_o').innerText;
    var total = document.getElementById('t_1').innerText;

    var mesaj = "*📊 ICĂ APP STORE*%0A" +
                "----------------------------%0A" +
                "💰 *Azi:* " + azi + " Lei%0A" +
                "🏢 *Flota:* " + flota + " Lei%0A" +
                "⛽ *Gaz:* " + gaz + " Lei%0A" +
                "🕒 *Taxe:* " + taxe + " Lei%0A" +
                "----------------------------%0A" +
                "📈 *TOTAL:* " + total + " Lei";

    window.location.href = "https://wa.me/?text=" + mesaj;
}
    </script>

</body>
</html>
